<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Quant — Prospector Labs</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>⚡ Social Quant</h1>
        <div class="subtitle">Prospector Labs</div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" onclick="toggleTheme()">
          🌓 Toggle Theme
        </button>
        <div class="kbd-hint">⌘K to search</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="main-header">
        <h2 id="page-title">Dashboard</h2>
        <div id="header-actions"></div>
      </header>
      <div class="main-content" id="main-content"></div>
    </main>
  </div>

  <!-- Search Modal (Cmd+K) -->
  <div class="search-overlay" id="search-overlay" onclick="if(event.target===this)toggleSearch()">
    <div class="search-modal">
      <div class="search-input-wrap">
        <span class="icon">🔍</span>
        <input class="search-input" id="search-input" placeholder="Search posts, accounts, topics..." oninput="onSearchInput(event)">
        <span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);">ESC</span>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
